<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mission Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">Mission Control</div>
        <button class="nav-btn active" data-view="dashboard">Executive Dashboard</button>
        <button class="nav-btn" data-view="notes">Notes</button>
        <button class="nav-btn" data-view="tasks">Tasks</button>
        <button class="nav-btn" data-view="resources">Resources</button>
        <button class="nav-btn" data-view="projects">Projects</button>
        <button class="nav-btn" data-view="activity">Activity Feed</button>
      </aside>
      <div id="mobileBackdrop" class="mobile-backdrop" aria-hidden="true"></div>
      <main class="main">
        <header class="topbar">
          <button id="menuBtn" class="menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">☰</button>
          <button id="tokenToggle" class="token-toggle" type="button" aria-expanded="false" aria-controls="tokenWrap">Auth</button>
          <div class="token-wrap" id="tokenWrap">
            <input id="token" placeholder="API token" />
            <button id="saveToken" class="primary">Save</button>
          </div>
          <form id="quickTaskForm" class="quick-task-wrap" autocomplete="off">
            <textarea id="quickTaskInput" name="title" placeholder="Quick add (1 per line)… (@me #med /tomorrow due:YYYY-MM-DD)" maxlength="1000" rows="1" required></textarea>
            <button type="submit" class="primary">+ Task</button>
            <div class="quick-chip-row" aria-label="Quick add shortcuts">
              <button type="button" class="quick-chip" data-quick-insert="@me">@me</button>
              <button type="button" class="quick-chip" data-quick-insert="@openclaw">@openclaw</button>
              <button type="button" class="quick-chip" data-quick-insert="#high">#high</button>
              <button type="button" class="quick-chip" data-quick-insert="#med">#med</button>
              <button type="button" class="quick-chip" data-quick-insert="/today">/today</button>
              <button type="button" class="quick-chip" data-quick-insert="/tomorrow">/tomorrow</button>
            </div>
          </form>
          <button id="themeBtn" title="Toggle theme">◐</button>
          <span id="tokenStatus" class="muted token-status" aria-live="polite"></span>
        </header>
        <section id="view"></section>
        <nav class="mobile-tabs" aria-label="Primary">
          <button class="tab-btn active" data-view="dashboard">Home</button>
          <button class="tab-btn" data-view="tasks">Tasks</button>
          <button class="tab-btn" data-view="notes">Notes</button>
          <button class="tab-btn" data-view="resources">Library</button>
          <button class="tab-btn" data-view="activity">Activity</button>
        </nav>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
