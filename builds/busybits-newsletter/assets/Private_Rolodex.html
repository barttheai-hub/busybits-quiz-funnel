<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Rolodex (Tier 3 Reward)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-2xl">
        <div class="text-6xl mb-6">🏆</div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">THE PRIVATE ROLODEX</h1>
        <p class="text-xl text-gray-400 mb-8">You've referred 10 people. Welcome to the inner circle.</p>
        
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-left space-y-6">
            <div>
                <h3 class="text-amber-500 font-bold uppercase tracking-wider text-sm mb-1">Tax Strategy</h3>
                <p class="text-lg font-semibold">CPA Name / Firm</p>
                <p class="text-gray-500 text-sm">contact@example.com (Mention "Ziga" for priority)</p>
            </div>
            <hr class="border-gray-800">
            <div>
                <h3 class="text-amber-500 font-bold uppercase tracking-wider text-sm mb-1">Ghostwriting</h3>
                <p class="text-lg font-semibold">Writer Name</p>
                <p class="text-gray-500 text-sm">agency@example.com</p>
            </div>
            <hr class="border-gray-800">
            <div>
                <h3 class="text-amber-500 font-bold uppercase tracking-wider text-sm mb-1">Web Development</h3>
                <p class="text-lg font-semibold">Dev Shop Name</p>
                <p class="text-gray-500 text-sm">dev@example.com</p>
            </div>
        </div>

        <p class="mt-8 text-sm text-gray-600">Confidential. Do not share.</p>
    </div>

</body>
</html>
