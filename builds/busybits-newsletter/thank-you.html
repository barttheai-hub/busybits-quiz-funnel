<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're In! — BusyBits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">
  <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
    <div class="mb-10 text-center">
      <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-green-100 text-green-600">
        <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h1 class="mb-3 text-3xl font-black tracking-tight md:text-5xl">You're In.</h1>
      <p class="text-lg text-slate-600">Your guide is ready now. Download it instantly below.</p>
    </div>

    <div class="w-full max-w-2xl rounded-2xl bg-white p-8 shadow-xl ring-1 ring-slate-900/5 text-center">
      <p class="text-sm text-slate-500 mb-2">Lead Magnet</p>
      <h2 class="text-2xl font-bold mb-4">High-Performance OS (CEO Edition)</h2>
      <a id="download-link" href="assets/High_Performance_OS_CEO_Edition.pdf" class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-6 py-3 text-base font-bold text-white shadow-lg transition hover:bg-slate-800 md:w-auto" target="_blank" rel="noopener">
        Download the PDF
      </a>
      <p id="email-line" class="mt-4 text-xs text-slate-500"></p>
    </div>
  </main>

  <script>
    const ASSET_URL = 'assets/High_Performance_OS_CEO_Edition.pdf';
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || localStorage.getItem('busybits_email') || '';
    const delivery = params.get('delivery') || 'download-only';

    const downloadLink = document.getElementById('download-link');
    const emailLine = document.getElementById('email-line');

    const attributionKeys = [
      'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term',
      'fbclid', 'gclid', 'ttclid',
      'first_touch_at', 'first_touch_url', 'last_touch_at', 'last_touch_url'
    ];
    const dlParams = new URLSearchParams();
    for (const key of attributionKeys) {
      const value = params.get(key);
      if (value) dlParams.set(key, value);
    }

    downloadLink.href = dlParams.toString() ? `${ASSET_URL}?${dlParams.toString()}` : ASSET_URL;
    if (email && delivery === 'webhook-ok') {
      emailLine.textContent = `A backup copy is being sent to ${email}.`;
    } else if (email && delivery === 'queued-retry') {
      emailLine.textContent = `Download is ready now. Backup email to ${email} is queued for retry.`;
    } else if (email) {
      emailLine.textContent = `Download is ready now. Configure webhook to auto-email a backup copy to ${email}.`;
    } else {
      emailLine.textContent = 'Tip: if the download does not open, disable popup blocking for this page.';
    }
  </script>
</body>
</html>
